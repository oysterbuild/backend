<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>OPMS</title>
    <!--[if mso]>
    <noscript>
        <xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml>
    </noscript>
    <![endif]-->
</head>
<body style="margin:0;padding:0;background-color:#F8FAFC;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">

    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#F8FAFC;">
        <tr>
            <td align="center" style="padding:32px 16px;">

                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;">

                    <!-- Card -->
                    <tr>
                        <td style="background-color:#ffffff;border-radius:16px;border:1px solid #E2E8F0;overflow:hidden;">

                            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">

                                <!-- Header -->
                                <tr>
                                    <td align="center" style="padding:28px 36px;border-bottom:1px solid #F1F5F9;">
                                        <img src="{{ logo_url }}" alt="OPMS" width="180" style="display:block;width:100%;max-width:180px;height:auto;border:0;outline:none;">
                                    </td>
                                </tr>

                                <!-- Content -->
                                <tr>
                                    <td style="padding:40px 36px;">
                                        {% block content %}{% endblock %}
                                    </td>
                                </tr>

                                <!-- Footer -->
                                <tr>
                                    <td align="center" style="padding:24px 36px;background-color:#F8FAFC;border-top:1px solid #F1F5F9;">
                                        <p style="margin:0;font-size:12px;color:#94A3B8;line-height:1.6;">
                                            &copy; 2025 OPMS Construction Management.<br>
                                            Lekki Port 2, Lagos, Nigeria.
                                        </p>
                                    </td>
                                </tr>

                            </table>

                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>
</html>
